# =====================================================
# PEDEUE.COM — Nginx Production Config
# =====================================================

# Zona restrita: apenas para endpoints de login/auth (proteção contra brute force)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Conexões persistentes com o Next.js
upstream nextjs_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Conexões persistentes com o WebSocket
upstream websocket_backend {
    server 127.0.0.1:3020;
    keepalive 32;
}

server {
    server_name pedeue.com www.pedeue.com *.pedeue.com;
    client_max_body_size 100M;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- WebSocket (socket.io) ---
    location /socket.io/ {
        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
    }

    # --- Rate limit APENAS nos endpoints de autenticação ---
    location ~ ^/api/auth/(signin|callback|signout) {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # --- Tudo o mais: SEM rate limit (Next.js faz muitas req paralelas) ---
    location / {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pedeue.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pedeue.com-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name pedeue.com www.pedeue.com *.pedeue.com;
    return 301 https://$host$request_uri;
}
