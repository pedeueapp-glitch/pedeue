services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}

    container_name: delivery-saas
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}

      - EFI_SANDBOX=${EFI_SANDBOX}
      - EFI_CLIENT_ID=${EFI_CLIENT_ID}
      - EFI_CLIENT_SECRET=${EFI_CLIENT_SECRET}
      - EFI_CERTIFICATE_BASE64=${EFI_CERTIFICATE_BASE64}
      - EFI_PIX_KEY=${EFI_PIX_KEY}
      - WS_SERVER_URL=http://websocket-saas:3010
    volumes:
      - uploads_data:/app/public/uploads
      - backups_data:/app/backups
      - logs_data:/app/logs

    depends_on:
      - db-saas-prod
      - websocket
    networks:
      - proxy-network

  websocket:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    container_name: websocket-saas
    restart: always
    environment:
      - PORT=3010
    ports:
      - "3020:3010"
    command: sh -c "mkdir -p logs && node socket-server.js 2>&1 | tee -a logs/socket.log"
    volumes:
      - logs_data:/app/logs
    networks:
      - proxy-network


  db-saas-prod:
    image: mysql:8.0
    container_name: db-saas
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: saas_secure_pedeue_2026
      MYSQL_DATABASE: saas_delivery
    command: --default-authentication-plugin=mysql_native_password

    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - proxy-network


networks:
  proxy-network:
    external: true

volumes:
  mysql_data:
  uploads_data:
  backups_data:
  logs_data:

