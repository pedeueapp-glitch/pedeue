version: '3.8'

services:
  app:
    build: .
    container_name: saas-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:root@db:3306/saas_delivery
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=pedeue_secret_key_2026
    # Este comando garante que o banco seja sincronizado ANTES do app subir
    command: sh -c "npx prisma db push && node server.js"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: saas-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=saas_delivery
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    # Verificação de saúde para garantir que o app só suba quando o DB estiver pronto
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
