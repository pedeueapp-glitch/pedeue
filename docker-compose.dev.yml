services:
  app:
    container_name: dev-delivery-saas
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    env_file:
      - .env.dev
    environment:
      - NEXT_PUBLIC_WS_URL=https://dev.pedeue.com
      - WS_SERVER_URL=http://dev-websocket-saas:3010
    volumes:
      - dev_uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      websocket:
        condition: service_started
    networks:
      - proxy-network
      - saas-internal

  websocket:
    image: node:20-alpine
    container_name: dev-websocket-saas
    restart: always
    working_dir: /app
    volumes:
      - .:/app
    # Instala as dependências antes de rodar para garantir que o socket.io exista no container
    command: sh -c "npm install socket.io && node socket-server.js"
    environment:
      - PORT=3010
    ports:
      - "3011:3010"
    networks:
      - proxy-network
      - saas-internal

  db:
    image: mysql:8.0
    container_name: dev-db-saas
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=dev_secure_password_2026
      - MYSQL_DATABASE=saas_delivery_dev
    volumes:
      - dev_mysql_data:/var/lib/mysql
    networks:
      - proxy-network
      - saas-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy-network:
    external: true
  saas-internal:
    driver: bridge

volumes:
  dev_mysql_data:
  dev_uploads_data:
